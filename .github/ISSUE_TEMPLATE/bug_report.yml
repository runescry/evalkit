name: Bug report
description: Report a bug in EvalKit
title: "[bug]: "
labels: ["bug"]
body:
  - type: input
    id: run-id
    attributes:
      label: Run ID
      description: If applicable, the eval run ID from /runs/[id]
      placeholder: run_abc123
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
